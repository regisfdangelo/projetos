<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>Widget Card</title>
</head>
<body>
    <header>
        <h1>Widget Financeiro</h1>
    </header>
    <main>
        <section>
            <h3>Saldo Atual</h3>
            <div class="saldoatual">

                <p id="numero">R$255.000</p>
                <button onclick="toggleNumero()"><i class="material-icons">home</i></button>

            </div> 
            <article>
                <div class="botao">                        
                    <div class="entrada">                       
                            <i class="material-icons">arrow_upward</i>
                        <div class="valor">                 
                            <p class="titulo">Entrada</p>
                            <p class="valore">+ R$200,00</p>
                        </div>
                    </div>                    
                    <div class="saida">
                            <i class="material-icons">arrow_downward</i>                         
                        <div class="valor">
                            <p class="titulo">Saída</p>
                            <p class="valors">- R$550,00</p>
                        </div>
                    </div>
            </article>
        </section>        
    </main> 
    <script>
        let visivel = true;

        function toggleNumero() {
        const el = document.getElementById("numero");

        if (visivel) {
            el.textContent = "******";
        } else {
            el.textContent = "R$255.000";
        }

        visivel = !visivel;
        }
    </script>
    
</body>
</html>
